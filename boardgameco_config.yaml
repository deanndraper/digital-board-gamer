# ============================================================================
# YouTube Channel Scanner — BoardGameCo Configuration
# ============================================================================
#
# Config for the BoardGameCo channel (@boardgameco) by Alex Radcliffe.
# Covers board game reviews, top-10 lists, and crowdfunding coverage.
#
# Usage:
#   SCANNER_CONFIG=boardgameco_config.yaml python llm_orchestrator.py
#
# ============================================================================

# ---------------------------------------------------------------------------
# Channels to scrape
# ---------------------------------------------------------------------------
channels:
  BoardGameCo: 'https://www.youtube.com/@boardgameco'

# ---------------------------------------------------------------------------
# LLM settings
# ---------------------------------------------------------------------------
llm:
  model: 'claude-sonnet-4-6'
  rate_limit_seconds: 20
  max_transcript_words: 12000
  prefilter:
    enabled: true
    model: 'claude-haiku-4-5-20251001'
    prompt: |
      Given this YouTube video title and description, is this video a board game
      review, ranking, or top-10 or top-X list of a specific board game?
      Answer YES if the title contains words like "review", "ranking", or "top 10".
      Only answer NO if it is clearly a playthrough, preview, or unrelated content.
      Answer only YES or NO followed by a brief reason.

      Title: {title}
      Description: {description}

# ---------------------------------------------------------------------------
# Orchestrator settings
# ---------------------------------------------------------------------------
orchestrator:
  db_name: 'boardgameco_state.db'
  videos_per_channel: 50
  log_file: 'boardgameco_orchestrator.log'
  output_jsonl: 'BoardGameCo_Insights.jsonl'

  # Video IDs to unconditionally skip (known off-topic content)
  skip_video_ids: []

  # Generic title keywords — videos matching any of these are skipped
  skip_title_keywords:
    - 'channel update'
    - 'vlog'
    - 'q&a'
    - 'giveaway'
    - 'unboxing haul'
    - 'live stream'
    - 'news & week in review'
    - 'ways to sell'
    - 'ways to trade'
    - 'youtube channels'
    - 'new years resolution'
    - 'where are they now'
    - 'final call'
    - 'going on with'
    - 'gamefound'
    - 'boardgamearena games i want'
    - 'expansions i want'
    - 'burnout'

  # The prompt sent to Claude for each video transcript
  extraction_prompt: |
    You are an AI tasked with analyzing a board game YouTube video transcript.

    Extract the following data points into a strictly formatted JSON object:
    1. A list of games covered in the video. For each game, extract:
       - "title": The name of the game.
       - "ranking": The numerical ranking given to the game in this video (e.g. 1 if it is their #1 game). Use null if no rank is given.
       - "score": The reviewer's personal numeric rating for the game (e.g. 7/10, 8.5/10). Use null if no personal rating is given. IMPORTANT: Do NOT put vote percentages, poll results, or community vote shares here — only the reviewer's own score out of 10.
       - "vote_percentage": If the video is about awards or polls, the percentage of votes this game received. Use null otherwise.
       - "award_category": If the game won or was nominated in an award category, the category name (e.g. "Best Casual Game"). Use null otherwise.
       - "opinion": A brief summary of the reviewer's subjective opinion of this specific game.
    2. "summary": A brief summary of the overall video. (string)
    3. "classification": Choose one of: 'best of year', 'how to play', 'new game including how to play', 'new game including how to play and rating', 'review', 'playthrough', 'other'. (string)

    Return ONLY a JSON object matching this schema precisely:
    {
        "games": [
            {
                "title": "Game Name",
                "ranking": 1,
                "score": 9.5,
                "vote_percentage": null,
                "award_category": null,
                "opinion": "absolutely fantastic mechanics."
            }
        ],
        "summary": "...",
        "classification": "..."
    }

# ---------------------------------------------------------------------------
# Extraction settings (extract_all.py)
# ---------------------------------------------------------------------------
extraction:
  spreadsheet_file: 'BoardGameCo Game Export.xlsx'
  output_file: 'Updated_BoardGameCo_Game_Export.xlsx'
  fuzzy_match_threshold: 85
  min_title_length: 3

  # Regex patterns removed from video titles to isolate the game name.
  # Each pattern is applied with re.sub(pattern, '', title) using (?i) flag.
  # Note: BGA-specific patterns removed (not relevant to this channel).
  title_cleaning_patterns:
    - '(?i)how to play'
    - '(?i)review'
    - '(?i)top \d+'
    - '(?i)playthrough'
    - '(?i)unboxing'
    - '(?i)tutorial'
    - '(?i)setup'
    - '(?i)full teach'
    - '(?i)visuals'
    - '(?i)1 minute overview'
    - '(?i)overview'
    - '(?i)relaxing solo playthrough'
    - '(?i)perfect for winding down'
    - '(?i)in \d+ mins?'
    - '(?i)in \d+ minutes?'
    - '(?i)game overview'

  # Regex used to split the cleaned title on separators
  title_split_separators: '[-–|:!+,]|\b(Re-upload|Preview|Update)\b'

  # Short words that are never valid game titles on their own
  excluded_short_words:
    - 'top'
    - 'the'
    - 'and'
    - 'with'

  # Keywords in video titles that trigger the "BGA Review" flag
  # Empty — BoardGameCo is not BGA-focused
  bga_detection_keywords: []

  # Column schema for new entries added to the spreadsheet
  new_entry_columns:
    score: 'TBD'
    top_10_rank: ''
    top_10_year: ''
    pick_of_the_week: ''
    honorable_mention: ''

# ---------------------------------------------------------------------------
# Validation settings (validate_data.py)
# ---------------------------------------------------------------------------
validation:
  fuzzy_threshold: 85
  video_limit: 100
  output_report: 'boardgameco_missing_games_report.csv'

  # Regex pattern for cleaning titles during validation
  title_cleaning_pattern: '(?i)\b(review|how to play|top \d+|playthrough|unboxing|tutorial|setup)\b'

# ---------------------------------------------------------------------------
# Test settings (test_claude.py)
# ---------------------------------------------------------------------------
testing:
  video_url: 'https://www.youtube.com/watch?v=3LSQiMBQgOc'
  prompt: 'What board game is discussed in this video? Reply in one sentence.'
